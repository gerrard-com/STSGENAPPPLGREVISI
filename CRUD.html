<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keluhan Warga</title>
    <link rel="stylesheet" href="css/crud.css" />
  </head>

  <body>
    <div class="header2">
<h1>Keluhan Warga</h1>
<div class="btn-add2" onclick="buka2()">+ Tambahkan Keluhan</div>
</div>

<div class="search2">
<input type="text" id="cari2" placeholder="Cari..." onkeyup="tampil2()">
</div>

<div class="data2">
<div class="box2"><h3>Total</h3><h1 id="total2">0</h1></div>
<div class="box2"><h3>Diproses</h3><h1 id="diproses2">0</h1></div>
<div class="box2"><h3>Selesai</h3><h1 id="selesai2">0</h1></div>
</div>

<div id="list2"></div>

<div id="popup2" class="popup2">
<div class="form2">
<h2>Form Keluhan</h2>

<input id="nama2" type="text" placeholder="Nama Lengkap">

<div class="dataformat2">
<input id="blok2" type="text" placeholder="Blok Rumah">
<input id="umur2" type="number" placeholder="Umur">
</div>

<input id="telp2" type="number" placeholder="No HP">
<input id="tanggal2" type="date">

<select id="jenis2">
<option>Infrastruktur</option>
<option>Keamanan</option>
<option>Kebersihan</option>
</select>

<textarea id="deskripsi2" placeholder="Jelaskan keluhan anda"></textarea>

<select id="status2">
<option>Menunggu</option>
<option>Diproses</option>
<option>Selesai</option>
</select>

<div class="btn-group2">
<div class="btn-submit2" onclick="simpan2()">Simpan</div>
<div class="btn-cancel2" onclick="tutup2()">Batal</div>
</div>
</div>
</div>
    <script src="js/crud.js"></script>
  </body>
</html>
