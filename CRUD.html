<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keluhan Warga</title>
    <link rel="stylesheet" href="css/crud.css" />
  </head>

  <body>
    <div class="header2">
      <h1><i class="fa-solid fa-comments"></i> Keluhan Warga</h1>
      <div class="btn-add2" onclick="buka2()">+ Tambah Keluhan</div>
    </div>

    <div class="search2">
      <input
        type="text"
        id="cari2"
        placeholder=" Cari nama warga..."
        onkeyup="tampil2()"
      />
    </div>

    <div class="data2">
      <div class="box2">
        <h3>Total</h3>
        <h1 id="total2">0</h1>
      </div>
      <div class="box2">
        <h3>Menunggu</h3>
        <h1 id="menunggu2">0</h1>
      </div>
      <div class="box2">
        <h3>Diproses</h3>
        <h1 id="diproses2">0</h1>
      </div>
      <div class="box2">
        <h3>Selesai</h3>
        <h1 id="selesai2">0</h1>
      </div>
    </div>

    <div id="list2"></div>

    <div id="popup2" class="popup2">
      <div class="form2">
        <h2><i class="fa-solid fa-edit"></i> Form Keluhan</h2>

        <input id="nama2" type="text" placeholder=" Nama Lengkap" />

        <div class="dataformat2">
          <input id="blok2" type="text" placeholder=" Blok Rumah" />
          <input id="umur2" type="number" placeholder=" Umur" />
        </div>

        <input id="telp2" type="tel" placeholder=" No. WhatsApp" />

        <select id="jenis2">
          <option value="">Pilih Jenis Keluhan</option>
          <option value="Infrastruktur">Infrastruktur</option>
          <option value="Keamanan">Keamanan</option>
          <option value="Kebersihan">Kebersihan</option>
          <option value="Lainnya">Lainnya</option>
        </select>

        <textarea
          id="deskripsi2"
          placeholder=" Jelaskan keluhan Anda secara detail..."
          rows="4"
        ></textarea>

        <select id="status2">
          <option value="Menunggu">Menunggu</option>
          <option value="Diproses">Diproses</option>
          <option value="Selesai">Selesai</option>
        </select>

        <div class="btn-group2">
          <button class="btn-submit2" onclick="simpan2()">Simpan</button>
          <button class="btn-cancel2" onclick="tutup2()">Batal</button>
        </div>
      </div>
    </div>
