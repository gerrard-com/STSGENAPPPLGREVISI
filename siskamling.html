<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kamling</title>
    <link rel="stylesheet" href="css/siskamling.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  </head>

  <body>
    <header>
      <h1>Jadwal Siskamling</h1>
      <h2>Sistem keamanan lingkungan</h2>
      <p>Jadwal ronda malam hari ini</p>
    </header>

    <main class="d-flex justify-content-center">
      <div id="jadwal" class="d-flex flex-wrap gap-3 justify-content-center">
        
        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Senin</div>
          <div id="list-0" class="mt-3"></div>
          <input id="input-0" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(0)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Selasa</div>
          <div id="list-1" class="mt-3"></div>
          <input id="input-1" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(1)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Rabu</div>
          <div id="list-2" class="mt-3"></div>
          <input id="input-2" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(2)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Kamis</div>
          <div id="list-3" class="mt-3"></div>
          <input id="input-3" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(3)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Jumat</div>
          <div id="list-4" class="mt-3"></div>
          <input id="input-4" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(4)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Sabtu</div>
          <div id="list-5" class="mt-3"></div>
          <input id="input-5" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(5)">Tambah</button>
        </div>

        <div class="card card3 p-3 m-3">
          <div class="card-header bg-primary text-white">Minggu</div>
          <div id="list-6" class="mt-3"></div>
          <input id="input-6" class="form-control mt-2" placeholder="Tambah nama"/>
          <button class="btn btn-primary mt-2" onclick="tambah3(6)">Tambah</button>
        </div>

      </div>
    </main>
    <script src="js/siskamling.js"></script>
  </body>
</html>
